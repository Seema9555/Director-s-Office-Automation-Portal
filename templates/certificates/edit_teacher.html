{% extends 'accounts/admin_dashboard.html' %}

{% block content %}
<div class="max-w-4xl mx-auto mt-6 mb-12 animate-fade-in-up">
    
    <div class="flex items-center gap-2 text-sm text-slate-500 mb-6 pl-1">
        <a href="{% url 'admin_dashboard' %}" class="hover:text-blue-600 transition-colors">Dashboard</a>
        <i class="fa-solid fa-chevron-right text-[10px] opacity-50"></i>
        <a href="{% url 'manage_teachers' %}" class="hover:text-blue-600 transition-colors">Manage Faculty</a>
        <i class="fa-solid fa-chevron-right text-[10px] opacity-50"></i>
        <span class="text-slate-800 font-semibold">Edit Faculty</span>
    </div>

    <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/60 border border-slate-100 overflow-hidden">
        
        <div class="bg-slate-50/50 px-8 py-6 border-b border-slate-100 flex justify-between items-center">
            <div>
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-3">
                    <span class="h-10 w-10 rounded-full bg-amber-100 text-amber-600 flex items-center justify-center shadow-sm">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </span>
                    Edit Faculty Profile
                </h2>
                <p class="text-sm text-slate-500 mt-1 ml-14">Updating <span class="font-semibold text-slate-700">{{ teacher.full_name }}</span></p>
            </div>
            <div class="hidden sm:block text-right">
                <span class="block text-xs text-slate-400 uppercase font-bold tracking-wider">Employee ID</span>
                <span class="text-lg font-mono font-bold text-blue-600">{{ teacher.employee_id }}</span>
            </div>
        </div>

        <form action="" method="POST" class="p-8">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                
                <div class="space-y-6">
                    <div class="flex items-center gap-2 pb-2 border-b border-slate-100">
                        <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Identity Information</span>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1.5">Full Name</label>
                        <input type="text" name="full_name" value="{{ teacher.full_name }}" required class="form-input">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Employee ID</label>
                        <input type="text" value="{{ teacher.employee_id }}" readonly class="form-input bg-slate-100 text-slate-500 cursor-not-allowed">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Department</label>
                        <select name="department" class="form-select">
                            <option value="CSE" {% if teacher.department == 'CSE' %}selected{% endif %}>Computer Science (CSE)</option>
                            <option value="IT" {% if teacher.department == 'IT' %}selected{% endif %}>Information Technology (IT)</option>
                            <option value="ECE" {% if teacher.department == 'ECE' %}selected{% endif %}>Electronics (ECE)</option>
                            <option value="ME" {% if teacher.department == 'ME' %}selected{% endif %}>Mechanical (ME)</option>
                            <option value="CHE" {% if teacher.department == 'CHE' %}selected{% endif %}>Chemical (CHE)</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="flex items-center gap-2 pb-2 border-b border-slate-100">
                        <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Contact Details</span>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
                        <input type="email" name="email" value="{{ teacher.email|default:'' }}" class="form-input">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Phone Number</label>
                        <input type="text" name="phone" value="{{ teacher.phone|default:'' }}" class="form-input">
                    </div>
                </div>

            </div>

            <div class="mt-10 pt-6 border-t border-slate-100 flex items-center justify-end gap-4">
                <a href="{% url 'manage_teachers' %}" class="px-6 py-2.5 rounded-xl text-slate-600 font-bold hover:bg-slate-100 hover:text-slate-900 transition-colors">
                    Discard
                </a>
                <button type="submit" class="px-8 py-2.5 bg-slate-900 hover:bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-slate-900/20 hover:shadow-indigo-500/30 transition-all transform hover:-translate-y-0.5 flex items-center gap-2">
                    <i class="fa-solid fa-floppy-disk"></i> Update Faculty
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    .form-input, .form-select {
        width: 100%;
        padding: 0.625rem 1rem;
        background-color: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 0.75rem;
        transition: all 0.2s;
        outline: none;
    }
    .form-input:focus, .form-select:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }
    .animate-fade-in-up {
        animation: fadeInUp 0.5s ease-out;
    }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
